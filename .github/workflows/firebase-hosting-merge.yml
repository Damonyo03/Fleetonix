# This file was auto-generated by Fleetonix Assistant to enable Automatic Deployment
name: Deploy to Firebase Hosting on Merge
'on':
  push:
    branches:
      - main
jobs:
  build_and_deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'
      - name: Install Dependencies
        run: |
          cd functions
          npm install
      - name: Install Firebase Tools
        run: npm install -g firebase-tools
      - name: Deploy to Firebase
        run: |
          echo "${{ secrets.FIREBASE_SERVICE_ACCOUNT_APPFLEETONIX }}" > service-account.json
          export GOOGLE_APPLICATION_CREDENTIALS=$(pwd)/service-account.json
          firebase deploy --only hosting,functions --project appfleetonix --non-interactive
