# This file was auto-generated by Fleetonix Assistant to enable Automatic Deployment
name: Deploy to Firebase Hosting on Merge
'on':
  push:
    branches:
      - main
jobs:
  build_and_deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'
      - name: Install Dependencies
        run: |
          cd functions
          npm install
      - name: Check Secret
        run: |
          if [ -z "${{ secrets.FIREBASE_SERVICE_ACCOUNT_APPFLEETONIX }}" ]; then
            echo "::error::FIREBASE_SERVICE_ACCOUNT_APPFLEETONIX secret is missing or empty!"
            exit 1
          fi
      - name: Authenticate to Google Cloud
        uses: google-github-actions/auth@v2
        with:
          credentials_json: ${{ secrets.FIREBASE_SERVICE_ACCOUNT_APPFLEETONIX }}
      - name: Deploy to Firebase Hosting
        run: npx firebase-tools deploy --only hosting --project appfleetonix --non-interactive
      - name: Deploy to Firebase Functions
        run: npx firebase-tools deploy --only functions --project appfleetonix --non-interactive --debug
