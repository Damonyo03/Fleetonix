<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Fleetonix - Admin - Drivers Information</title>
    <link rel="icon" type="image/jpeg" href="../img/logo.jpg">
    <link rel="stylesheet" href="../assets/css/style.css">
    <link rel="stylesheet" href="../assets/css/admin.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        .driver-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(300px, 1fr)); gap: 20px; margin-top: 20px; }
        .driver-card { background: var(--bg-secondary); border-radius: 12px; border: 1px solid var(--border-color); padding: 20px; position: relative; }
        .driver-status { position: absolute; top: 15px; right: 15px; width: 12px; height: 12px; border-radius: 50%; }
        .driver-status.available { background: #10b981; box-shadow: 0 0 10px #10b981; }
        .driver-status.on_schedule { background: #3b82f6; box-shadow: 0 0 10px #3b82f6; }
        .driver-status.offline { background: #6b7280; }
        .driver-info h3 { margin-bottom: 5px; color: var(--text-primary); }
        .driver-info p { color: var(--text-secondary); font-size: 0.9em; margin-bottom: 5px; }
        .driver-meta { margin-top: 15px; padding-top: 15px; border-top: 1px solid var(--border-color); display: flex; justify-content: space-between; font-size: 0.85em; }
    </style>
</head>
<body>
    <div class="admin-container">
        <aside class="admin-sidebar" id="sidebar">
            <div class="sidebar-header">
                <img src="../img/logo.jpg" alt="Logo" class="sidebar-logo">
                <span class="sidebar-title">Fleetonix</span>
            </div>
            <nav class="sidebar-nav">
                <div class="nav-section-label">MONITORING</div>
                <a href="dashboard.html" class="nav-item"><i class="fas fa-chart-line"></i> Dashboard Map</a>
                <a href="drivers.html" class="nav-item active"><i class="fas fa-id-card"></i> Drivers Information</a>

                <div class="nav-section-label">OPERATIONS</div>
                <a href="bookings.html" class="nav-item"><i class="fas fa-calendar-check"></i> Bookings</a>
                <a href="schedules.html" class="nav-item"><i class="fas fa-list-alt"></i> List of Trips</a>
                <a href="trip-tickets.html" class="nav-item"><i class="fas fa-ticket-alt"></i> Trip Tickets</a>

                <div class="nav-section-label">SYSTEM</div>
                <a href="registered-users.html" class="nav-item"><i class="fas fa-users"></i> Registered Users</a>

                <div class="nav-section-label">NOTIFICATIONS</div>
                <a href="notifications.html" class="nav-item"><i class="fas fa-bell"></i> System Notification <span class="notif-count" style="display:none;"></span></a>
                <a href="#" id="logoutBtn" class="nav-item logout"><i class="fas fa-sign-out-alt"></i> Logout</a>
            </nav>
        </aside>

        <main class="admin-main" id="mainContent">
            <header class="admin-header">
                <div class="header-left">
                    <button class="menu-toggle" id="menuToggle"><i class="fas fa-bars"></i></button>
                    <h2>Drivers Information</h2>
                </div>
                <div class="header-right">
                    <a href="notifications.html" class="notification-icon">
                        <i class="fas fa-bell"></i>
                        <span class="notification-badge" style="display: none;">0</span>
                    </a>
                    <div class="user-menu">
                        <div class="user-avatar">A</div>
                        <span>Admin</span>
                    </div>
                </div>
            </header>

            <div class="admin-content">
                <div class="page-header">
                    <h1 class="page-title">Drivers</h1>
                    <div class="header-actions">
                        <button class="btn btn-primary" id="addDriverBtn"><i class="fas fa-plus"></i> Add New Driver</button>
                    </div>
                </div>

                <div class="table-header">
                    <div class="search-box">
                        <i class="fas fa-search"></i>
                        <input type="text" id="driverSearch" placeholder="Search drivers by name, plate, or vehicle...">
                    </div>
                    <div class="filter-box">
                        <select id="statusFilter">
                            <option value="all">All Status</option>
                            <option value="available">Available</option>
                            <option value="on_schedule">On Schedule</option>
                            <option value="offline">Offline</option>
                        </select>
                    </div>
                </div>

                <div class="driver-grid" id="driverGrid">
                    <!-- Driver cards will be injected here -->
                    <p style="text-align: center; grid-column: 1/-1; padding: 40px;">Loading drivers...</p>
                </div>
            </div>
        </main>
    </div>

    <!-- Modal Placeholder -->
    <div id="modalContainer"></div>

    <script type="module" src="../assets/js/admin.js"></script>
    <script type="module" src="../assets/js/admin-drivers.js"></script>
</body>
</html>
