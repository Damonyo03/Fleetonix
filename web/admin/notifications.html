<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Fleetonix - Admin - Notifications</title>
    <link rel="icon" type="image/jpeg" href="../img/logo.jpg">
    <link rel="stylesheet" href="../assets/css/style.css">
    <link rel="stylesheet" href="../assets/css/admin.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        .notification-list { display: flex; flex-direction: column; gap: 15px; margin-top: 20px; }
        .notification-card { background: var(--bg-secondary); border-radius: 12px; border: 1px solid var(--border-color); padding: 20px; display: flex; gap: 15px; align-items: flex-start; }
        .notification-card.unread { border-left: 4px solid #3b82f6; }
        .notif-icon { width: 40px; height: 40px; border-radius: 50%; display: flex; align-items: center; justify-content: center; flex-shrink: 0; }
        .notif-icon.info { background: rgba(59, 130, 246, 0.1); color: #3b82f6; }
        .notif-icon.warning { background: rgba(245, 158, 11, 0.1); color: #f59e0b; }
        .notif-content h4 { margin-bottom: 5px; color: var(--text-primary); }
        .notif-content p { color: var(--text-secondary); font-size: 0.9em; line-height: 1.4; }
        .notif-time { font-size: 0.8em; color: var(--text-muted); margin-top: 8px; }
    </style>
</head>
<body>
    <div class="admin-container">
        <aside class="admin-sidebar" id="sidebar">
            <div class="sidebar-header">
                <img src="../img/logo.jpg" alt="Logo" class="sidebar-logo">
                <span class="sidebar-title">Fleetonix</span>
            </div>
            <nav class="sidebar-nav">
                <div class="nav-section-label">MONITORING</div>
                <a href="dashboard.html" class="nav-item"><i class="fas fa-chart-line"></i> Dashboard Map</a>
                <a href="drivers.html" class="nav-item"><i class="fas fa-truck-moving"></i> Asset List</a>
                
                <div class="nav-section-label">OPERATIONS</div>
                <a href="bookings.html" class="nav-item"><i class="fas fa-calendar-check"></i> Bookings</a>
                <a href="schedules.html" class="nav-item"><i class="fas fa-tasks"></i> Dispatch Console</a>
                <a href="clients.html" class="nav-item"><i class="fas fa-building"></i> Client Accounts</a>
                <a href="users.html" class="nav-item"><i class="fas fa-user-shield"></i> System Users</a>

                <div class="nav-section-label">SAFETY & LOGS</div>
                <a href="activity.html" class="nav-item"><i class="fas fa-history"></i> Activity Logs</a>
                <a href="notifications.html" class="nav-item active"><i class="fas fa-bell"></i> System Alerts <span class="notif-count">0</span></a>
                <a href="#" id="logoutBtn" class="nav-item logout"><i class="fas fa-sign-out-alt"></i> Logout</a>
            </nav>
        </aside>

        <main class="admin-main" id="mainContent">
            <header class="admin-header">
                <div class="header-left">
                    <button class="menu-toggle" id="menuToggle"><i class="fas fa-bars"></i></button>
                    <h2>Notifications</h2>
                </div>
                <div class="header-right">
                    <a href="notifications.html" class="notification-icon">
                        <i class="fas fa-bell"></i>
                        <span class="notification-badge" style="display: none;">0</span>
                    </a>
                    <div class="user-menu">
                        <div class="user-avatar">A</div>
                        <span>Admin</span>
                    </div>
                </div>
            </header>

            <div class="admin-content">
                <div class="page-header">
                    <h1 class="page-title">Notifications</h1>
                </div>

                <div class="notification-list" id="notificationList">
                    <p style="text-align: center; padding: 40px;">Loading notifications...</p>
                </div>
            </div>
        </main>
    </div>

    <!-- Modal Placeholder -->
    <div id="modalContainer"></div>

    <script type="module" src="../assets/js/admin.js"></script>
    <script type="module" src="../assets/js/admin-notifications.js"></script>
</body>
</html>
