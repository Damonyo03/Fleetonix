<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <!-- SEO & Metadata -->
    <meta name="description" content="Create a new Fleetonix account to manage your fleet efficiently.">
    <meta property="og:title" content="Fleetonix - Create Account">
    <meta property="og:image" content="https://appfleetonix.web.app/img/logo.jpg">
    <meta name="theme-color" content="#0a0e27">

    <title>Fleetonix - Create Account</title>
    <link rel="icon" type="image/jpeg" href="img/logo.jpg">
    <link rel="stylesheet" href="assets/css/style.css">
    <style>
        .alert { padding: 10px; margin-bottom: 15px; border-radius: 4px; display: none; }
        .alert-error { background-color: #f8d7da; color: #721c24; border: 1px solid #f5c6cb; }
        .alert-success { background-color: #d4edda; color: #155724; border: 1px solid #c3e6cb; }
        .loading { opacity: 0.7; pointer-events: none; }
        .requirement-item { font-size: 0.8em; color: var(--text-muted); list-style: none; margin-bottom: 5px; }
        .requirement-item.valid { color: #10b981; }
        .requirement-item.valid::before { content: "✓ "; }
    </style>
</head>
<body class="login-body">
    <div class="login-container">
        <div class="logo-section">
            <img src="img/logo.jpg" alt="Fleettonix Logo" class="logo-main">
        </div>

        <div class="login-card" id="registrationCard">
            <h2 style="text-align: center; margin-bottom: 25px; color: var(--text-primary);">Create Account</h2>
            <div id="statusMessage" class="alert"></div>
            
            <form id="registerForm">
                <div class="form-group">
                    <label for="full_name">Full Name</label>
                    <input type="text" id="full_name" class="form-input" placeholder="Enter your full name" required>
                </div>

                <div class="form-group">
                    <label for="email">Email</label>
                    <input type="email" id="email" class="form-input" placeholder="Enter your email" required>
                </div>

                <div class="form-group">
                    <label for="phone">Phone Number</label>
                    <input type="tel" id="phone" class="form-input" placeholder="Enter your phone number" required>
                </div>

                <div class="form-group">
                    <label for="company_name">Company Name</label>
                    <input type="text" id="company_name" class="form-input" placeholder="Enter your company name" required>
                </div>

                <div class="form-group">
                    <label for="password">Password</label>
                    <div class="password-wrapper">
                        <input type="password" id="password" class="form-input" placeholder="Create a password (min. 16 characters)" required minlength="16">
                        <i class="fas fa-eye password-toggle" id="togglePassword"></i>
                    </div>
                    <ul class="requirement-list" style="margin-top: 10px; padding-left: 0;">
                        <li id="req-length" class="requirement-item">At least 16 characters</li>
                    </ul>
                </div>

                <div class="form-group">
                    <label for="confirm_password">Confirm Password</label>
                    <div class="password-wrapper">
                        <input type="password" id="confirm_password" class="form-input" placeholder="Confirm your password" required minlength="16">
                        <i class="fas fa-eye password-toggle" id="toggleConfirmPassword"></i>
                    </div>
                </div>

                <button type="submit" id="registerBtn" class="btn btn-primary">Create Account</button>
                <button type="button" class="btn btn-secondary" onclick="window.location.href='login.html'">Back to Login</button>
            </form>
        </div>

        <!-- Verification Card (Hidden by default) -->
        <div class="login-card" id="verificationCard" style="display: none;">
            <h2 style="text-align: center; margin-bottom: 15px; color: var(--text-primary);">Verify Account</h2>
            <p style="text-align: center; color: var(--text-secondary); margin-bottom: 25px; font-size: 0.9rem;">
                We've sent a 6-digit verification code to <br><strong id="displayEmail" style="color: var(--accent-blue);"></strong>
            </p>
            
            <div id="verifyStatusMessage" class="alert"></div>
            
            <form id="verifyForm">
                <div class="form-group">
                    <label for="otp">Verification Code</label>
                    <input type="text" id="otp" class="form-input" placeholder="Enter 6-digit code" required 
                           maxlength="6" autocomplete="one-time-code" style="text-align: center; font-size: 1.5rem; letter-spacing: 5px; font-weight: bold;">
                </div>

                <button type="submit" id="verifyBtn" class="btn btn-primary">Verify & Create Account</button>
                
                <div style="text-align: center; margin-top: 20px;">
                    <p style="font-size: 0.9rem; color: var(--text-muted); margin-bottom: 15px;">
                        Didn't receive the code? 
                        <a href="#" id="resendCode" style="color: var(--accent-blue); text-decoration: none; font-weight: 500;">Resend Code</a>
                    </p>
                    <button type="button" class="btn btn-secondary" id="backToRegister" style="border: none; background: transparent; padding: 0; text-transform: none; color: var(--text-secondary); width: auto;">
                        <i class="fas fa-arrow-left"></i> Edit Details
                    </button>
                </div>
            </form>
        </div>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js";
        import { getAuth, createUserWithEmailAndPassword } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-auth.js";
        import { getFirestore, doc, setDoc, serverTimestamp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore.js";
        import { firebaseConfig } from "./assets/js/firebase-config.js";

        const app = initializeApp(firebaseConfig);
        const auth = getAuth(app);
        const db = getFirestore(app);

        const form = document.getElementById('registerForm');
        const btn = document.getElementById('registerBtn');
        const status = document.getElementById('statusMessage');
        const registrationCard = document.getElementById('registrationCard');
        const verificationCard = document.getElementById('verificationCard');
        const verifyForm = document.getElementById('verifyForm');
        const verifyBtn = document.getElementById('verifyBtn');
        const verifyStatus = document.getElementById('verifyStatusMessage');
        const displayEmail = document.getElementById('displayEmail');

        let pendingUserData = null;

        form.addEventListener('submit', async (e) => {
            e.preventDefault();
            const fullName = document.getElementById('full_name').value;
            const email = document.getElementById('email').value;
            const phone = document.getElementById('phone').value;
            const company = document.getElementById('company_name').value;
            const password = document.getElementById('password').value;
            const confirm = document.getElementById('confirm_password').value;

            if (password !== confirm) {
                showStatus("Passwords do not match", "error");
                return;
            }

            pendingUserData = { fullName, email, phone, company, password };
            
            setLoading(true);
            try {
                // Call Cloud Function to send OTP
                const response = await fetch('https://sendregistrationotp-appfleetonix.a.run.app', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ email, phone })
                });

                const result = await response.json();
                if (result.success) {
                    displayEmail.innerText = email || phone;
                    registrationCard.style.display = 'none';
                    verificationCard.style.display = 'block';
                    showStatus("", "success", verifyStatus); // Reset status
                } else {
                    showStatus(result.message || "Failed to send verification code.", "error");
                    setLoading(false);
                }
            } catch (error) {
                console.error("OTP Error:", error);
                showStatus("An error occurred. Please try again later.", "error");
                setLoading(false);
            }
        });

        verifyForm.addEventListener('submit', async (e) => {
            e.preventDefault();
            const otp = document.getElementById('otp').value;
            
            if (otp.length !== 6) {
                showStatus("Please enter the 6-digit code.", "error", verifyStatus);
                return;
            }

            setVerifyLoading(true);
            try {
                // Call Cloud Function to complete registration
                const response = await fetch('https://completeregistration-appfleetonix.a.run.app', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({
                        email: pendingUserData.email,
                        phone: pendingUserData.phone,
                        otp: otp,
                        userData: {
                            full_name: pendingUserData.fullName,
                            password: pendingUserData.password,
                            phone: pendingUserData.phone,
                            company_name: pendingUserData.company
                        }
                    })
                });

                const result = await response.json();
                if (result.success) {
                    showStatus("Account created successfully! Redirecting...", "success", verifyStatus);
                    setTimeout(() => window.location.href = 'login.html', 2000);
                } else {
                    showStatus(result.message || "Invalid or expired code.", "error", verifyStatus);
                    setVerifyLoading(false);
                }
            } catch (error) {
                console.error("Verification Error:", error);
                showStatus("Verification failed. Please try again.", "error", verifyStatus);
                setVerifyLoading(false);
            }
        });

        document.getElementById('backToRegister').addEventListener('click', () => {
            verificationCard.style.display = 'none';
            registrationCard.style.display = 'block';
            setLoading(false);
        });

        document.getElementById('resendCode').addEventListener('click', async (e) => {
            e.preventDefault();
            showStatus("Resending code...", "info", verifyStatus);
            try {
                const response = await fetch('https://sendregistrationotp-appfleetonix.a.run.app', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ 
                        email: pendingUserData.email, 
                        phone: pendingUserData.phone 
                    })
                });
                const result = await response.json();
                if (result.success) {
                    showStatus("Code resent successfully!", "success", verifyStatus);
                } else {
                    showStatus(result.message || "Failed to resend code.", "error", verifyStatus);
                }
            } catch (error) {
                showStatus("Error resending code.", "error", verifyStatus);
            }
        });

        // Toggle Password Visibility
        setupPasswordToggle('togglePassword', 'password');
        setupPasswordToggle('toggleConfirmPassword', 'confirm_password');

        function setupPasswordToggle(toggleId, inputId) {
            const toggle = document.getElementById(toggleId);
            const input = document.getElementById(inputId);
            
            input.addEventListener('input', function() {
                if (this.value.length > 0) {
                    toggle.classList.add('visible');
                } else {
                    toggle.classList.remove('visible');
                    input.setAttribute('type', 'password');
                    toggle.classList.add('fa-eye');
                    toggle.classList.remove('fa-eye-slash');
                }
            });

            toggle.addEventListener('click', function() {
                const type = input.getAttribute('type') === 'password' ? 'text' : 'password';
                input.setAttribute('type', type);
                this.classList.toggle('fa-eye');
                this.classList.toggle('fa-eye-slash');
            });
        }

        function getFriendlyErrorMessage(code) {
            switch (code) {
                case 'auth/email-already-in-use':
                    return "This email is already registered. Please login instead.";
                case 'auth/invalid-email':
                    return "The email address is not valid.";
                case 'auth/operation-not-allowed':
                    return "Account creation is currently disabled.";
                case 'auth/weak-password':
                    return "The password is too weak. Please use at least 16 characters.";
                default:
                    return "An error occurred during registration. Please try again.";
            }
        }

        function showStatus(msg, type, element = status) {
            if (!msg) {
                element.style.display = 'none';
                return;
            }
            element.innerText = msg;
            element.className = `alert alert-${type}`;
            element.style.display = 'block';
        }

        function setLoading(isLoading) {
            btn.classList.toggle('loading', isLoading);
            btn.innerText = isLoading ? 'Sending Code...' : 'Create Account';
            btn.disabled = isLoading;
        }

        function setVerifyLoading(isLoading) {
            verifyBtn.classList.toggle('loading', isLoading);
            verifyBtn.innerText = isLoading ? 'Verifying...' : 'Verify & Create Account';
            verifyBtn.disabled = isLoading;
        }
    </script>
</body>
</html>
