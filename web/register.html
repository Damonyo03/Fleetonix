<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Fleetonix - Create Account</title>
    <link rel="icon" type="image/jpeg" href="img/logo.jpg">
    <link rel="stylesheet" href="assets/css/style.css">
    <style>
        .alert { padding: 10px; margin-bottom: 15px; border-radius: 4px; display: none; }
        .alert-error { background-color: #f8d7da; color: #721c24; border: 1px solid #f5c6cb; }
        .alert-success { background-color: #d4edda; color: #155724; border: 1px solid #c3e6cb; }
        .loading { opacity: 0.7; pointer-events: none; }
        .requirement-item { font-size: 0.8em; color: var(--text-muted); list-style: none; margin-bottom: 5px; }
        .requirement-item.valid { color: #10b981; }
        .requirement-item.valid::before { content: "✓ "; }
    </style>
</head>
<body class="login-body">
    <div class="login-container">
        <div class="logo-section">
            <img src="img/logo.jpg" alt="Fleettonix Logo" class="logo-main">
        </div>

        <div class="login-card">
            <h2 style="text-align: center; margin-bottom: 25px; color: var(--text-primary);">Create Account</h2>
            <div id="statusMessage" class="alert"></div>
            
            <form id="registerForm">
                <div class="form-group">
                    <label for="full_name">Full Name</label>
                    <input type="text" id="full_name" class="form-input" placeholder="Enter your full name" required>
                </div>

                <div class="form-group">
                    <label for="email">Email</label>
                    <input type="email" id="email" class="form-input" placeholder="Enter your email" required>
                </div>

                <div class="form-group">
                    <label for="phone">Phone Number</label>
                    <input type="tel" id="phone" class="form-input" placeholder="Enter your phone number" required>
                </div>

                <div class="form-group">
                    <label for="company_name">Company Name</label>
                    <input type="text" id="company_name" class="form-input" placeholder="Enter your company name" required>
                </div>

                <div class="form-group">
                    <label for="password">Password</label>
                    <input type="password" id="password" class="form-input" placeholder="Create a password (min. 16 characters)" required minlength="16">
                    <ul class="requirement-list" style="margin-top: 10px; padding-left: 0;">
                        <li id="req-length" class="requirement-item">At least 16 characters</li>
                    </ul>
                </div>

                <div class="form-group">
                    <label for="confirm_password">Confirm Password</label>
                    <input type="password" id="confirm_password" class="form-input" placeholder="Confirm your password" required minlength="16">
                </div>

                <button type="submit" id="registerBtn" class="btn btn-primary">Create Account</button>
                <button type="button" class="btn btn-secondary" onclick="window.location.href='login.html'">Back to Login</button>
            </form>
        </div>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js";
        import { getAuth, createUserWithEmailAndPassword } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-auth.js";
        import { getFirestore, doc, setDoc, serverTimestamp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore.js";
        import { firebaseConfig } from "./assets/js/firebase-config.js";

        const app = initializeApp(firebaseConfig);
        const auth = getAuth(app);
        const db = getFirestore(app);

        const form = document.getElementById('registerForm');
        const btn = document.getElementById('registerBtn');
        const status = document.getElementById('statusMessage');

        form.addEventListener('submit', async (e) => {
            e.preventDefault();
            const email = document.getElementById('email').value;
            const password = document.getElementById('password').value;
            const confirm = document.getElementById('confirm_password').value;
            const fullName = document.getElementById('full_name').value;
            const phone = document.getElementById('phone').value;
            const company = document.getElementById('company_name').value;

            if (password !== confirm) {
                showStatus("Passwords do not match", "error");
                return;
            }

            setLoading(true);
            try {
                const userCredential = await createUserWithEmailAndPassword(auth, email, password);
                const user = userCredential.user;

                // Create user metadata in Firestore
                await setDoc(doc(db, "users", user.uid), {
                    full_name: fullName,
                    email: email,
                    phone: phone,
                    company_name: company,
                    user_type: "client",
                    status: "active",
                    created_at: serverTimestamp()
                });

                showStatus("Account created successfully! Redirecting...", "success");
                setTimeout(() => window.location.href = 'login.html', 2000);
            } catch (error) {
                console.error("Registration error:", error);
                showStatus("Error: " + error.message, "error");
                setLoading(false);
            }
        });

        function showStatus(msg, type) {
            status.innerText = msg;
            status.className = `alert alert-${type}`;
            status.style.display = 'block';
        }

        function setLoading(isLoading) {
            btn.classList.toggle('loading', isLoading);
            btn.innerText = isLoading ? 'Creating Account...' : 'Create Account';
            btn.disabled = isLoading;
        }
    </script>
</body>
</html>
