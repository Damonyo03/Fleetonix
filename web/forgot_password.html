<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Fleetonix - Forgot Password</title>
    <link rel="icon" type="image/jpeg" href="img/logo.jpg">
    <link rel="stylesheet" href="assets/css/style.css">
    <style>
        .alert { padding: 10px; margin-bottom: 15px; border-radius: 4px; display: none; }
        .alert-error { background-color: #f8d7da; color: #721c24; border: 1px solid #f5c6cb; }
        .alert-success { background-color: #d4edda; color: #155724; border: 1px solid #c3e6cb; }
        .loading { opacity: 0.7; pointer-events: none; }
    </style>
</head>
<body class="login-body">
    <div class="login-container">
        <div class="logo-section">
            <img src="img/logo.jpg" alt="Fleettonix Logo" class="logo-main">
        </div>

        <div class="login-card">
            <h2 style="text-align: center; color: var(--text-primary); margin-bottom: 10px;">Forgot Password</h2>
            <p style="text-align: center; color: var(--text-secondary); margin-bottom: 25px;">
                Enter your email address and we'll send you a link to reset your password.
            </p>
            
            <div id="statusMessage" class="alert"></div>
            
            <form id="forgotForm">
                <div class="form-group">
                    <label for="email">Email</label>
                    <input type="email" id="email" class="form-input" placeholder="Enter your email" required>
                </div>

                <button type="submit" id="resetBtn" class="btn btn-primary">Send Reset Link</button>
                <button type="button" class="btn btn-secondary" onclick="window.location.href='login.html'">Back to Login</button>
            </form>
        </div>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js";
        import { getAuth, sendPasswordResetEmail } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-auth.js";
        import { firebaseConfig } from "./assets/js/firebase-config.js";

        const app = initializeApp(firebaseConfig);
        const auth = getAuth(app);

        const form = document.getElementById('forgotForm');
        const btn = document.getElementById('resetBtn');
        const status = document.getElementById('statusMessage');

        form.addEventListener('submit', async (e) => {
            e.preventDefault();
            const email = document.getElementById('email').value;

            setLoading(true);
            try {
                await sendPasswordResetEmail(auth, email);
                showStatus("Reset email sent! Please check your inbox.", "success");
            } catch (error) {
                console.error("Reset error:", error);
                showStatus("Error: " + error.message, "error");
            } finally {
                setLoading(false);
            }
        });

        function showStatus(msg, type) {
            status.innerText = msg;
            status.className = `alert alert-${type}`;
            status.style.display = 'block';
        }

        function setLoading(isLoading) {
            btn.classList.toggle('loading', isLoading);
            btn.innerText = isLoading ? 'Sending...' : 'Send Reset Link';
            btn.disabled = isLoading;
        }
    </script>
</body>
</html>
